<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniAide 工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">



  <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FAFAFA;
  --surface: #FFFFFF;
  --text: #1D1D1F;
  --secondary: #6E6E73;
  --muted: #aeaeb2;
  --accent: #007AFF;
  --accent-rgb: 0, 122, 255;
  --border: rgba(0,0,0,0.06);
  --shadow: 0 2px 12px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.02);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-full: 50px;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Inter', 'Segoe UI', sans-serif;
}
body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

/* Top Bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 44px; background: var(--surface);
  border-bottom: 1px solid var(--border); -webkit-app-region: drag;
  flex-shrink: 0;
}
.topbar-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; color: var(--secondary); }
.topbar-actions { display: flex; align-items: center; gap: 6px; -webkit-app-region: no-drag; }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%; display: inline-block;
  transition: background 0.3s;
}
.sync-dot.connected { background: #34C759; }
.sync-dot.disconnected { background: #FF3B30; }
.sync-dot.syncing { background: #FF9F0A; }
.sync-label { font-size: 11px; color: var(--secondary); margin-left: 4px; }
.icon-btn {
  width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent;
  cursor: pointer; color: var(--secondary); display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.icon-btn:hover { background: rgba(0,0,0,0.05); color: var(--text); }
.icon-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.8; fill: none; }

/* Main Layout */
.main { flex: 1; display: flex; overflow: hidden; }
.sidebar {
  width: 52px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 2px;
  flex-shrink: 0;
}
.nav-item {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); position: relative;
  transition: all 0.2s;
}
.nav-item:hover { background: rgba(0,0,0,0.04); color: var(--secondary); }
.nav-item.active { background: rgba(var(--accent-rgb), 0.1); color: var(--accent); }
.nav-item svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 28px 32px; }
.view { display: none; }
.view.active { display: block; }

/* Dashboard */
.greeting { margin-bottom: 28px; }
.greeting h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; }
.greeting p { font-size: 13px; color: var(--secondary); margin-top: 4px; }

.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

.app-row { display: flex; gap: 10px; margin-bottom: 32px; }
.app-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  width: 72px; padding: 14px 0 10px; border-radius: var(--radius);
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
  box-shadow: var(--shadow);
}
.app-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); border-color: rgba(var(--accent-rgb),0.2); }
.app-btn:active { transform: scale(0.97); }
.app-btn .icon-wrap {
  width: 32px; height: 32px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.app-btn .icon-wrap svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; }
.app-btn .label { font-size: 10px; font-weight: 500; color: var(--secondary); }

/* File List */
.file-list { display: flex; flex-direction: column; gap: 6px; }
.file-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
}
.file-item:hover { border-color: rgba(var(--accent-rgb),0.25); }
.file-icon { width: 18px; height: 18px; flex-shrink: 0; }
.file-icon svg { width: 18px; height: 18px; stroke: var(--accent); stroke-width: 1.8; fill: none; }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
.empty-state { text-align: center; padding: 32px 0; color: var(--muted); font-size: 13px; }

/* Settings */
.settings-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 14px; border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.settings-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }
.form-group label { display: block; font-size: 11px; font-weight: 500; color: var(--secondary); margin-bottom: 5px; }
.form-group input {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 12px; outline: none; background: var(--bg); color: var(--text);
  transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(var(--accent-rgb),0.12); }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px; border-radius: var(--radius-full);
  font-size: 12px; font-weight: 500; border: none; cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { transform: translateY(-1px) scale(1.02); box-shadow: 0 4px 14px rgba(var(--accent-rgb),0.35); }
.btn-primary:active { transform: scale(0.97); transition-duration: 0.1s; }
.btn-danger { background: #FF3B30; color: #fff; }
.btn-danger:hover { transform: translateY(-1px) scale(1.02); box-shadow: 0 4px 14px rgba(255,59,48,0.35); }
.btn-ghost {
  background: transparent; border: 1px solid var(--border); color: var(--secondary);
}
.btn-ghost:hover { background: rgba(0,0,0,0.03); color: var(--text); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.btn-sm { padding: 7px 16px; font-size: 11px; }

.file-card {
  background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);
  padding:16px;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow);
}
.file-card:hover { border-color:rgba(var(--accent-rgb),0.25);transform:translateY(-2px); }
.file-card .fc-icon { font-size:32px;text-align:center;padding:12px 0; }
.file-card .fc-name { font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:8px; }
.file-card .fc-meta { font-size:10px;color:var(--muted);margin-top:2px; }

.event-list { max-height: 150px; overflow-y: auto; margin-top: 8px; }
.event-item { display: flex; justify-content: space-between; padding: 5px 0; font-size: 11px; color: var(--secondary); border-bottom: 1px solid var(--border); }
.event-item:last-child { border-bottom: none; }
.event-time { color: var(--muted); font-size: 10px; }
.tiptap-toolbar { display: flex; align-items: center; }
.tt-btn { padding:3px 8px;border:none;border-radius:4px;cursor:pointer;font-size:12px;background:transparent;color:var(--secondary); }
.tt-btn:hover { background:rgba(0,0,0,0.04);color:var(--text); }
.tt-btn.active { background:var(--accent);color:#fff; }
.tt-sep { color:var(--border);margin:0 4px;font-size:12px; }
.note-item.active { background:rgba(var(--accent-rgb),0.08);border-left:2px solid var(--accent);padding-left:10px !important; }
.note-item:hover { background:rgba(0,0,0,0.02); }
.note-item.active:hover { background:rgba(var(--accent-rgb),0.1); }
#ttEditorContent .ProseMirror { outline:none; min-height:50px; }
#ttEditorContent .ProseMirror h1 { font-size:1.6em;font-weight:700;margin:0.4em 0; }
#ttEditorContent .ProseMirror h2 { font-size:1.3em;font-weight:600;margin:0.3em 0; }
#ttEditorContent .ProseMirror h3 { font-size:1.1em;font-weight:600;margin:0.3em 0; }
#ttEditorContent .ProseMirror p { margin:0.3em 0; }
#ttEditorContent .ProseMirror ul, #ttEditorContent .ProseMirror ol { padding-left:1.5em; }
#ttEditorContent .ProseMirror blockquote { border-left:3px solid var(--accent);margin:0.5em 0;padding:0.3em 1em;color:var(--secondary); }
#ttEditorContent .ProseMirror a { color:var(--accent);text-decoration:underline; }
#ttEditorContent .ProseMirror img { max-width:100%;border-radius:6px;margin:0.5em 0; }
#ttEditorContent .ProseMirror p.is-editor-empty:first-child::before { content:attr(data-placeholder);float:left;color:var(--muted);pointer-events:none;height:0; }
#ttEditorContent { overflow-y:auto; }
#ttEditorContent::-webkit-scrollbar { width:6px; }
#ttEditorContent::-webkit-scrollbar-thumb { background:#c0c4cc;border-radius:3px; }
.tt-btn { padding:3px 8px;border:none;border-radius:4px;cursor:pointer;font-size:12px;background:transparent;color:var(--secondary); }
.tt-btn:hover { background:rgba(0,0,0,0.04);color:var(--text); }
.tt-btn.active { background:var(--accent);color:#fff; }
.tt-sep { color:var(--border);margin:0 4px;font-size:12px; }
</style>
</head>
<body>
  <!-- Login Gate (shown when not authenticated) -->
  <div id="loginGate" style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)">
    <div style="width:340px">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:22px;font-weight:700;letter-spacing:-0.03em">OmniAide</div>
        <div style="font-size:12px;color:var(--secondary);margin-top:4px">登录到服务器</div>
      </div>
      <div class="settings-card" style="padding:24px">
        <div class="form-group">
          <label>服务器地址</label>
          <input type="text" id="gateServerUrl" value="http://localhost:8000" placeholder="http://localhost:8000" />
        </div>
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="gateUsername" placeholder="用户名" autofocus />
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="gatePassword" placeholder="密码" onkeydown="if(event.key==='Enter')doGateLogin()" />
        </div>
        <button class="btn btn-primary" id="gateLoginBtn" onclick="doGateLogin()" style="width:100%;justify-content:center;margin-top:4px">登录</button>
        <div id="gateLoginError" style="font-size:12px;color:#FF3B30;text-align:center;margin-top:8px;min-height:18px"></div>
      </div>
    </div>
  </div>

  <!-- Main App (shown after login) -->
  <div id="appMain" style="display:none;flex-direction:column;height:100vh">
  <div class="topbar">
    <span class="topbar-title">OmniAide</span>
    <div class="topbar-actions">
      <span class="sync-dot disconnected" id="syncDot"></span>
      <span class="sync-label" id="syncLabel">未连接</span>
      <button class="icon-btn" onclick="doLogout()" title="退出登录">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="nav-item" onclick="showView('dashboard')" title="工作台">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="nav-item" onclick="showView('files');loadFiles()" title="文件">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="nav-item" onclick="showView('notes')" title="笔记">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div style="flex:1"></div>
      <div class="nav-item" id="navUser" onclick="showUserMenu()" style="font-size:10px;font-weight:600;color:var(--secondary);cursor:pointer;position:relative" title="用户"></div>
      <div id="userMenu" style="display:none;position:absolute;bottom:100px;left:56px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,0.1);z-index:200;width:140px;overflow:hidden;font-size:12px">
        <div onclick="showView('settings')" style="padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s" onmouseover="this.style.background='rgba(0,0,0,0.03)'" onmouseout="this.style.background=''">个人中心</div>
        <div onclick="doLogout()" style="padding:10px 16px;cursor:pointer;color:#FF3B30;transition:background 0.15s" onmouseover="this.style.background='rgba(0,0,0,0.03)'" onmouseout="this.style.background=''">退出登录</div>
      </div>
      <div class="nav-item" onclick="showView('settings')" title="设置">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
    </div>

    <div class="content">
      <!-- Dashboard -->
      <div id="viewDashboard" class="view active">
        <div class="greeting">
          <h1 id="greetingText">欢迎回来</h1>
          <p id="subText">OmniAide 桌面工作台</p>
        </div>
        <!-- AI Prompt Bar -->
        <div style="margin-bottom:24px">
          <div style="display:flex;gap:8px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:8px 12px;box-shadow:var(--shadow);transition:border-color 0.2s" id="aiBar">
            <input type="text" id="chatInput" placeholder="向 AI 提问..." style="flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--text)" onkeydown="if(event.key==='Enter')sendChat()" />
            <button class="btn btn-primary btn-sm" onclick="sendChat()" style="flex-shrink:0;padding:6px 16px">发送</button>
          </div>
          <div id="chatMessages" style="margin-top:8px;max-height:160px;overflow-y:auto;display:none"></div>
        </div>

        <div class="section-label">快捷入口</div>
        <div class="app-row">
          <div class="app-btn" onclick="showView('files');loadFiles()">
            <div class="icon-wrap" style="background:rgba(0,122,255,0.1);color:#007AFF">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </div>
            <span class="label">文件</span>
          </div>
          <div class="app-btn" onclick="showView('files');loadFiles('/')">
            <div class="icon-wrap" style="background:rgba(52,199,89,0.1);color:#34C759">
              <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </div>
            <span class="label">工作空间</span>
          </div>
          <div class="app-btn" onclick="showView('files');loadFiles()">
            <div class="icon-wrap" style="background:rgba(255,159,10,0.1);color:#FF9F0A">
              <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            </div>
            <span class="label">刷新</span>
          </div>
        </div>

        <div class="section-label">最近文件</div>
        <div id="recentFiles" class="file-list"></div>
      </div>

      <!-- Files -->
      <div id="viewFiles" class="view">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:4px">
            <button class="icon-btn" onclick="loadFiles('/')" title="根目录"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
            <button class="icon-btn" onclick="goBackFolder()" title="上级目录"><svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
            <button class="icon-btn" onclick="loadFiles()" title="刷新"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-ghost btn-sm" onclick="showNewFolderDialog()">+ 新建</button>
            <button class="btn btn-primary btn-sm" onclick="uploadFile()">上传</button>
            <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)" multiple />
          </div>
        </div>
        <div id="folderBreadcrumb" style="font-size:12px;margin-bottom:12px;color:var(--secondary)"></div>
        <div id="fileGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">
          <div class="empty-state" style="grid-column:1/-1">加载中...</div>
        </div>
      </div>

      <!-- Notes -->
      <div id="viewNotes" class="view">
        <div style="display:flex;height:calc(100vh - 100px);gap:12px">
          <div style="width:220px;flex-shrink:0;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column">
            <div style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">
              <span style="font-size:12px;font-weight:600">笔记</span>
              <button class="icon-btn" onclick="createNote()" title="新建笔记"><svg viewBox="0 0 24 24" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            </div>
            <div id="noteList" style="flex:1;overflow-y:auto;font-size:12px">
              <div style="color:var(--muted);text-align:center;padding:20px">加载中...</div>
            </div>
          </div>
          <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column">
            <div id="noteEditor" style="display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden">
              <div style="padding:14px 20px 6px;">
                <input type="text" id="noteTitle" placeholder="无标题" style="width:100%;border:none;outline:none;font-size:18px;font-weight:700;background:transparent;color:var(--text)" />
              </div>

              <div id="ttEditor" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
                <div id="ttToolbar" class="tiptap-toolbar" style="display:none;padding:4px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center">
                  <button class="tt-btn" data-cmd="bold" style="font-weight:700">B</button>
                  <button class="tt-btn" data-cmd="italic" style="font-style:italic">I</button>
                  <button class="tt-btn" data-cmd="underline" style="text-decoration:underline">U</button>
                  <span class="tt-sep">|</span>
                  <button class="tt-btn" data-cmd="h1">H1</button>
                  <button class="tt-btn" data-cmd="h2">H2</button>
                  <button class="tt-btn" data-cmd="h3">H3</button>
                  <span class="tt-sep">|</span>
                  <button class="tt-btn" data-cmd="bulletList">≡</button>
                  <button class="tt-btn" data-cmd="orderedList">#</button>
                  <button class="tt-btn" data-cmd="blockquote">"</button>
                </div>
                <div id="ttEditorContent" style="flex:1;padding:16px 20px;overflow-y:auto;outline:none"></div>
              </div>
              <div style="padding:6px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end">
                <button class="btn btn-ghost btn-sm" onclick="deleteCurrentNote()" style="color:#f56c6c">删除</button>
              </div>
            </div>
            <div id="noteEmpty" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px">
              选择或创建一篇笔记
            </div>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <div id="viewSettings" class="view">
        <div class="greeting" style="margin-bottom:20px">
          <h1 style="font-size:20px">设置</h1>
        </div>

        <div id="syncSettings" style="display:block">
          <div class="settings-card">
            <h3>已登录 <span style="color:#34C759;font-size:12px;font-weight:400">●</span> <span id="loggedUser" style="font-weight:400;font-size:12px;color:var(--secondary)"></span></h3>
            <div class="form-group">
              <label>工作空间</label>
              <select id="workspaceSelect" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none;background:var(--bg);color:var(--text)">
                <option value="">选择工作空间...</option>
              </select>
            </div>
          </div>

          <div class="settings-card">
            <h3>本地同步</h3>
            <div class="form-group">
              <label>同步文件夹</label>
              <div class="input-row">
                <input type="text" id="localPath" placeholder="选择本地文件夹..." readonly onclick="selectFolder()" />
                <button class="btn btn-ghost btn-sm" onclick="selectFolder()" style="flex-shrink:0">浏览</button>
        </div>

            <div style="display:flex;gap:8px;margin-top:14px">
              <button class="btn btn-primary" id="startBtn" onclick="startSync()">开始同步</button>
              <button class="btn btn-danger" id="stopBtn" onclick="stopSync()" disabled>停止</button>
              <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="margin-left:auto">退出</button>
            </div>
          </div>

          <div class="settings-card">
            <h3>同步日志</h3>
            <div id="eventList" class="event-list">
              <div class="empty-state">暂无同步事件</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- New Folder Dialog -->
  <div id="newFolderDialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center" onclick="if(event.target===this)document.getElementById('newFolderDialog').style.display='none'">
    <div style="background:var(--surface);border-radius:var(--radius);padding:24px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.15)">
      <div style="font-weight:600;font-size:14px;margin-bottom:16px">新建文件夹</div>
      <input type="text" id="newFolderName" placeholder="文件夹名称" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;margin-bottom:16px" onkeydown="if(event.key==='Enter')doCreateFolder()" />
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('newFolderDialog').style.display='none'">取消</button>
        <button class="btn btn-primary btn-sm" onclick="doCreateFolder()">创建</button>
      </div>
    </div>
  </div>

  <!-- Preview Dialog -->
  <div id="previewDialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center" onclick="if(event.target===this)closePreview()">
    <div style="background:var(--surface);border-radius:var(--radius);padding:24px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-weight:600;font-size:14px">文件预览</span>
        <button class="icon-btn" onclick="closePreview()" style="font-size:18px;line-height:1">&times;</button>
      </div>
      <div id="previewContent"></div>
    </div>
  </div>

  <script>
    let config = {}
    let currentToken = ''

    async function doGateLogin() {
      const serverUrl = document.getElementById('gateServerUrl').value
      const username = document.getElementById('gateUsername').value
      const password = document.getElementById('gatePassword').value
      const errEl = document.getElementById('gateLoginError')
      const btn = document.getElementById('gateLoginBtn')
      if (!username || !password) { errEl.textContent = '请输入用户名和密码'; return }
      errEl.textContent = ''
      btn.disabled = true; btn.textContent = '登录中...'
      try {
        const res = await fetch(serverUrl + '/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })
        if (!res.ok) { const d = await res.json(); throw new Error(typeof d.detail === 'string' ? d.detail : '登录失败') }
        const data = await res.json()
        currentToken = data.access_token
        config = { serverUrl, token: currentToken, workspaceId: null, localPath: '', username }
        await window.electronAPI.saveConfig(config)
        document.getElementById('loginGate').style.display = 'none'
        document.getElementById('appMain').style.display = 'flex'
        document.getElementById('loggedUser').textContent = username
        document.getElementById('navUser').textContent = username.charAt(0).toUpperCase()
        document.getElementById('greetingText').textContent = username
        document.getElementById('subText').textContent = 'OmniAide 桌面工作台'
        await loadWorkspaces()
        await loadRecentFiles()
      } catch (e) {
        errEl.textContent = e.message
      } finally {
        btn.disabled = false; btn.textContent = '登录'
      }
    }

    async function doLogout() {
      try { await window.electronAPI.stopSync() } catch(e) {}
      currentToken = ''
      config = { serverUrl: config.serverUrl || 'http://localhost:8000', token: '', workspaceId: null, localPath: '' }
      await window.electronAPI.saveConfig(config)
      document.getElementById('appMain').style.display = 'none'
      document.getElementById('loginGate').style.display = 'flex'
      document.getElementById('gatePassword').value = ''
      document.getElementById('workspaceSelect').innerHTML = '<option value="">选择工作空间...</option>'
      document.getElementById('syncDot').className = 'sync-dot disconnected'
      document.getElementById('syncLabel').textContent = '未连接'
      document.getElementById('startBtn').disabled = false
      document.getElementById('stopBtn').disabled = true
    }

    // === File Management ===
    let allFiles = []
    let currentFolder = '/'

    async function loadFiles(folder) {
      if (folder !== undefined) currentFolder = folder.replace(/\/+/g, '/')
      const grid = document.getElementById('fileGrid')
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">加载中...</div>'
      try {
        const q = 'page_size=100&folder_path=' + encodeURIComponent(currentFolder)
        const res = await fetch(config.serverUrl + '/api/v1/files?' + q, {
          headers: { Authorization: 'Bearer ' + currentToken }
        })
        if (!res.ok) return
        const data = await res.json()
        allFiles = data.files || []
        renderFiles()
        renderBreadcrumb()
      } catch (e) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">加载失败</div>'
      }
    }

    function renderBreadcrumb() {
      const el = document.getElementById('folderBreadcrumb')
      const parts = currentFolder.split('/').filter(Boolean)
      let html = '<a href="#" onclick="loadFiles(\'/\')" style="color:var(--accent);text-decoration:none">全部</a>'
      let path = ''
      parts.forEach((p, i) => {
        path += '/' + p
        html += ' / <a href="#" onclick="loadFiles(\'' + path + '/\')" style="color:var(--accent);text-decoration:none">' + p + '</a>'
      })
      el.innerHTML = html
    }

    function renderFiles() {
      const grid = document.getElementById('fileGrid')
      if (!allFiles.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">空文件夹</div>'
        return
      }
      grid.innerHTML = allFiles.map(f => {
        if (f.is_folder) {
          const folderPath = (f.folder_path.replace(/\/+$/, '') || '') + '/' + f.original_name + '/'
          return '<div class="file-card" onclick="loadFiles(\'' + folderPath + '\')">' +
            '<div class="fc-icon">📁</div>' +
            '<div class="fc-name">' + f.original_name + '</div>' +
            '<div class="fc-meta">文件夹</div></div>'
        }
        const ext = (f.original_name || '').split('.').pop().toLowerCase()
        const isImg = ['jpg','jpeg','png','gif','webp','svg','bmp'].includes(ext)
        const isVideo = ['mp4','webm','mkv','avi'].includes(ext)
        const isAudio = ['mp3','wav','flac','aac'].includes(ext)
        const isPdf = ext === 'pdf'
        const isZip = ['zip','rar','7z','tar','gz'].includes(ext)
        const icon = isImg ? '🖼' : isVideo ? '🎬' : isAudio ? '🎵' : isPdf ? '📄' : isZip ? '📦' : '📄'
        const size = f.size ? (f.size / 1024).toFixed(f.size > 1024*1024 ? 2 : 0) + (f.size > 1024*1024 ? ' MB' : ' KB') : ''
        const time = f.created_at ? new Date(f.created_at).toLocaleDateString() : ''
        return '<div class="file-card" onclick="previewFile(' + f.id + ')">' +
          '<div class="fc-icon">' + icon + '</div>' +
          '<div class="fc-name">' + f.original_name + '</div>' +
          '<div class="fc-meta">' + size + ' ' + time + '</div></div>'
      }).join('')
    }

    function goBackFolder() {
      const parts = currentFolder.split('/').filter(Boolean)
      if (parts.length <= 1) { loadFiles('/'); return }
      parts.pop()
      loadFiles('/' + parts.join('/') + '/')
    }

    function showNewFolderDialog() {
      document.getElementById('newFolderName').value = ''
      document.getElementById('newFolderDialog').style.display = 'flex'
      document.getElementById('newFolderName').focus()
    }

    async function doCreateFolder() {
      const name = document.getElementById('newFolderName').value.trim()
      if (!name) return
      try {
        await fetch(config.serverUrl + '/api/v1/files/folder', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + currentToken },
          body: JSON.stringify({ name, parent_path: currentFolder })
        })
        document.getElementById('newFolderDialog').style.display = 'none'
        await loadFiles()
      } catch (e) { alert('创建失败') }
    }

    function uploadFile() {
      document.getElementById('fileInput').click()
    }

    async function handleFileSelect(event) {
      const files = event.target.files
      if (!files.length) return
      for (const file of files) {
        try {
          // Get presigned URL
          const urlRes = await fetch(config.serverUrl + '/api/v1/files/upload-url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + currentToken },
            body: JSON.stringify({ filename: file.name, mime_type: file.type, folder_path: currentFolder })
          })
          if (!urlRes.ok) continue
          const { upload_url, file_id } = await urlRes.json()
          // Upload to MinIO
          await fetch(upload_url, { method: 'PUT', body: file })
          // Confirm
          await fetch(config.serverUrl + '/api/v1/files/confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + currentToken },
            body: JSON.stringify({ file_id })
          })
        } catch (e) { console.error('Upload failed:', file.name, e) }
      }
      event.target.value = ''
      await loadFiles()
    }

    async function previewFile(fileId) {
      try {
        const res = await fetch(config.serverUrl + '/api/v1/files/' + fileId, {
          headers: { Authorization: 'Bearer ' + currentToken }
        })
        if (!res.ok) return
        const f = await res.json()
        // Get download URL for preview
        const dlRes = await fetch(config.serverUrl + '/api/v1/files/' + fileId + '/download-url', {
          headers: { Authorization: 'Bearer ' + currentToken }
        })
        const dl = dlRes.ok ? (await dlRes.json()).download_url : null
        const ext = (f.original_name || '').split('.').pop().toLowerCase()
        const isImg = ['jpg','jpeg','png','gif','webp','svg','bmp'].includes(ext)
        const html = '<div style="padding:8px 0">' +
          '<p style="font-size:13px;font-weight:600;margin-bottom:8px">' + f.original_name + '</p>' +
          '<p style="font-size:11px;color:var(--secondary);margin-bottom:4px">大小: ' + (f.size ? (f.size / 1024).toFixed(1) + ' KB' : '-') + '</p>' +
          '<p style="font-size:11px;color:var(--secondary);margin-bottom:4px">类型: ' + (f.mime_type || '-') + '</p>' +
          '<p style="font-size:11px;color:var(--secondary);margin-bottom:12px">创建: ' + (f.created_at ? new Date(f.created_at).toLocaleString() : '-') + '</p>' +
          (isImg && dl ? '<img src="' + dl + '" style="max-width:100%;max-height:400px;border-radius:8px" />' : '') +
          (dl ? '<div style="margin-top:12px"><button class="btn btn-primary btn-sm" onclick="window.open(\'' + dl + '\')">下载</button></div>' : '') +
          '</div>'
        document.getElementById('previewContent').innerHTML = html
        document.getElementById('previewDialog').style.display = 'flex'
      } catch (e) {}
    }

    function closePreview() {
      document.getElementById('previewDialog').style.display = 'none'
    }

    async function loadWorkspaces() {
      try {
        const res = await fetch(config.serverUrl + '/api/v1/workspaces', {
          headers: { Authorization: 'Bearer ' + currentToken }
        })
        if (!res.ok) return
        const workspaces = await res.json()
        const sel = document.getElementById('workspaceSelect')
        sel.innerHTML = '<option value="">选择工作空间...</option>'
        workspaces.forEach(w => {
          const opt = document.createElement('option')
          opt.value = w.id
          opt.textContent = w.name + ' (ID: ' + w.id + ')'
          sel.appendChild(opt)
        })
      } catch (e) {}
    }

    function showUserMenu() {
      const m = document.getElementById('userMenu')
      m.style.display = m.style.display === 'block' ? 'none' : 'block'
    }

    document.addEventListener('click', function(e) {
      const m = document.getElementById('userMenu')
      if (m && !e.target.closest('#navUser') && !e.target.closest('#userMenu')) {
        m.style.display = 'none'
      }
    })

    function showView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
      document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'))
      document.getElementById('view' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active')
      const idx = name === 'dashboard' ? 0 : name === 'files' ? 1 : name === 'notes' ? 2 : 3
      document.querySelectorAll('.nav-item')[idx]?.classList.add('active')
      if (name === 'dashboard') loadRecentFiles()
      if (name === 'notes') loadNotes()
    }

    async function loadRecentFiles() {
      const el = document.getElementById('recentFiles')
      try {
        const res = await fetch(config.serverUrl + '/api/v1/files?page_size=10&status=active', {
          headers: { Authorization: 'Bearer ' + currentToken }
        })
        if (!res.ok) { el.innerHTML = '<div class="empty-state">加载失败</div>'; return }
        const data = await res.json()
        if (!data.files || !data.files.length) {
          el.innerHTML = '<div class="empty-state">暂无文件</div>'
          return
        }
        el.innerHTML = data.files.map(f => {
          const isImg = ['jpg','jpeg','png','gif','webp','svg','bmp'].includes((f.original_name||'').split('.').pop())
          const icon = f.is_folder ? '📁' : isImg ? '🖼' : '📄'
          const size = f.size ? (f.size/1024).toFixed(1) + ' KB' : ''
          return '<div class="file-item" onclick="showView(\'files\')">' +
            '<span class="file-icon">' + icon + '</span>' +
            '<div class="file-info"><div class="file-name">' + f.original_name + '</div>' +
            '<div class="file-meta">' + size + ' ' + (f.created_at?new Date(f.created_at).toLocaleDateString():'') + '</div></div></div>'
        }).join('')
      } catch(e) { el.innerHTML = '<div class="empty-state">加载失败</div>' }
    }

    function sendChat() {
      const input = document.getElementById('chatInput')
      const msg = input.value.trim()
      if (!msg) return
      input.value = ''
      const msgs = document.getElementById('chatMessages')
      msgs.style.display = 'block'
      msgs.innerHTML += '<div style="display:flex;justify-content:flex-end;margin-bottom:6px"><div style="background:var(--accent);color:#fff;border-radius:12px 12px 4px 12px;padding:6px 10px;font-size:12px;max-width:80%">' + escapeHtml(msg) + '</div></div>'
      msgs.innerHTML += '<div style="display:flex;margin-bottom:6px" id="thinkingMsg"><div style="background:var(--bg);border-radius:12px 12px 12px 4px;padding:6px 10px;font-size:11px;color:var(--muted)">●</div></div>'
      msgs.scrollTop = msgs.scrollHeight
      fetch(config.serverUrl + '/api/v1/mcp/call', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + currentToken },
        body: JSON.stringify({ name: 'get_system_context', arguments: {} })
      }).then(r => r.json()).then(data => {
        document.getElementById('thinkingMsg')?.remove()
        const reply = data.content?.[0]?.text || '无法获取响应'
        msgs.innerHTML += '<div style="display:flex;margin-bottom:6px"><div style="background:var(--bg);border-radius:12px 12px 12px 4px;padding:6px 10px;font-size:12px;max-width:80%">' + escapeHtml(reply.substring(0, 500)) + '</div></div>'
        msgs.scrollTop = msgs.scrollHeight
      }).catch(() => {
        document.getElementById('thinkingMsg')?.remove()
        msgs.innerHTML += '<div style="display:flex;margin-bottom:6px"><div style="background:#fef0f0;border-radius:12px 12px 12px 4px;padding:6px 10px;font-size:12px;color:#f56c6c">连接失败</div></div>'
      })
    }

    function escapeHtml(text) {
      const d = document.createElement('div')
      d.textContent = text
      return d.innerHTML
    }

    function openWeb(path) {
      const base = config.serverUrl || 'http://localhost:8000'
      const url = base.replace(/:\d+$/, ':3000') + path
      window.electronAPI.openExternal(url)
    }

    window.electronAPI.getConfig().then(c => {
      config = c
      if (c.token) {
        currentToken = c.token
        document.getElementById('gateServerUrl').value = c.serverUrl || 'http://localhost:8000'
        document.getElementById('loginGate').style.display = 'none'
        document.getElementById('appMain').style.display = 'flex'
        document.getElementById('localPath').value = c.localPath || ''
        document.getElementById('greetingText').textContent = c.username || '已连接'
        loadRecentFiles()
        if (c.workspaceId && c.localPath) startSync()
      }
    })

    window.electronAPI.onSyncStatus((status) => {
      const dot = document.getElementById('syncDot')
      const label = document.getElementById('syncLabel')
      dot.className = 'sync-dot ' + status
      const labels = { connected: '已连接', disconnected: '未连接', syncing: '同步中', connecting: '连接中...' }
      label.textContent = labels[status] || status
    })

    window.electronAPI.onSyncEvent((event) => {
      const list = document.getElementById('eventList')
      list.querySelector('.empty-state')?.remove()
      const item = document.createElement('div')
      item.className = 'event-item'
      const dir = event.direction === 'remote' ? '↓' : '↑'
      const types = { create: '创建', modify: '修改', delete: '删除' }
      const time = new Date(event.timestamp || Date.now()).toLocaleTimeString()
      item.innerHTML = '<span>' + dir + ' ' + (types[event.event_type] || event.event_type) + ' ' + event.file_path + '</span><span class="event-time">' + time + '</span>'
      list.insertBefore(item, list.firstChild)
      if (list.children.length > 50) list.removeChild(list.lastChild)
      
      const rl = document.getElementById('recentFiles')
      rl.querySelector('.empty-state')?.remove()
      const fi = document.createElement('div')
      fi.className = 'file-item'
      fi.innerHTML = '<div class="file-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div><div class="file-info"><div class="file-name">' + event.file_path + '</div><div class="file-meta">' + time + '</div></div>'
      rl.insertBefore(fi, rl.firstChild)
    })

    // === Notes (TipTap local bundle) ===
    let currentNoteId = null
    let notesCache = []

    function startEditor(content) {
      const el = document.getElementById('ttEditorContent')
      el.innerHTML = ''
      document.getElementById('ttToolbar').style.display = 'flex'
      if (window.EditorAPI) {
        window.EditorAPI.init(el, content || '', currentNoteId, config.serverUrl, currentToken)
        window.EditorAPI._onSave = () => loadNotes()
      } else if (!window._loadingEditor) {
        window._loadingEditor = true
        const s = document.createElement('script')
        s.src = '../dist-editor/editor.js'
        s.onload = () => {
          window._loadingEditor = false
          startEditor(content)
        }
        document.head.appendChild(s)
      }
    }

    async function loadNotes() {
      const list = document.getElementById('noteList')
      try {
        const res = await fetch(config.serverUrl + '/api/plugins/notes', {
          headers: { Authorization: 'Bearer ' + currentToken }
        })
        if (!res.ok) { list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px">加载失败</div>'; return }
        notesCache = await res.json()
        if (!notesCache.length) {
          list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px">暂无笔记</div>'
          return
        }
        list.innerHTML = notesCache.map(n => {
          return '<div class="note-item' + (n.id === currentNoteId ? ' active' : '') + '" onclick="openNote(' + n.id + ')" style="padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s">' +
            '<div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (n.title || '无标题') + '</div>' +
            '<div style="font-size:10px;color:var(--muted);margin-top:2px">' + (n.updated_at ? new Date(n.updated_at).toLocaleDateString() : '') + '</div></div>'
        }).join('')
      } catch(e) { list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px">加载失败</div>' }
    }

    async function createNote() {
      try {
        const res = await fetch(config.serverUrl + '/api/plugins/notes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + currentToken },
          body: JSON.stringify({ title: '无标题', content: '' })
        })
        if (!res.ok) return
        const note = await res.json()
        currentNoteId = note.id
        document.getElementById('noteTitle').value = ''
        document.getElementById('noteEditor').style.display = 'flex'
        document.getElementById('noteEmpty').style.display = 'none'
        startEditor('')
        await loadNotes()
      } catch(e) {}
    }

    async function openNote(id) {
      currentNoteId = id
      try {
        const res = await fetch(config.serverUrl + '/api/plugins/notes/' + id, {
          headers: { Authorization: 'Bearer ' + currentToken }
        })
        if (!res.ok) return
        const note = await res.json()
        document.getElementById('noteTitle').value = note.title || ''
        document.getElementById('noteEditor').style.display = 'flex'
        document.getElementById('noteEmpty').style.display = 'none'
        startEditor(note.content || '')
        await loadNotes()
      } catch(e) {}
    }

    async function saveNote() {
      if (!currentNoteId) return
      if (window.EditorAPI) window.EditorAPI.save()
      const title = document.getElementById('noteTitle').value
      try {
        await fetch(config.serverUrl + '/api/plugins/notes/' + currentNoteId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + currentToken },
          body: JSON.stringify({ title })
        })
        await loadNotes()
      } catch(e) {}
    }

    async function deleteCurrentNote() {
      if (!currentNoteId) return
      if (!confirm('确定删除此笔记？')) return
      try {
        await fetch(config.serverUrl + '/api/plugins/notes/' + currentNoteId, {
          method: 'DELETE',
          headers: { Authorization: 'Bearer ' + currentToken }
        })
        currentNoteId = null
        document.getElementById('noteEditor').style.display = 'none'
        document.getElementById('noteEmpty').style.display = 'flex'
        await loadNotes()
      } catch(e) {}
    }

    async function selectFolder() {
      const folder = await window.electronAPI.selectFolder()
      if (folder) document.getElementById('localPath').value = folder
    }

    async function startSync() {
      const wsSelect = document.getElementById('workspaceSelect')
      const wsId = parseInt(wsSelect?.value || config.workspaceId)
      config = {
        serverUrl: config.serverUrl,
        token: currentToken || config.token,
        workspaceId: wsId || config.workspaceId,
        localPath: document.getElementById('localPath').value
      }
      if (!config.token || !config.workspaceId || !config.localPath) {
        alert('请先登录并选择工作空间和同步文件夹')
        return
      }
      await window.electronAPI.saveConfig(config)
      await window.electronAPI.startSync(config)
      document.getElementById('startBtn').disabled = true
      document.getElementById('stopBtn').disabled = false
      document.getElementById('greetingText').textContent = '同步已启动'
      document.getElementById('subText').textContent = '监视中: ' + config.localPath
    }

    async function stopSync() {
      await window.electronAPI.stopSync()
      document.getElementById('startBtn').disabled = false
      document.getElementById('stopBtn').disabled = true
      document.getElementById('greetingText').textContent = '同步已暂停'
      document.getElementById('subText').textContent = 'OmniAide 桌面工作台'
    }
  </script>
</body>
</html>
