<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Note Editor</title>  <script type="module" crossorigin src="/assets/index-CEUu24K-.js"></script>
</head>
<body>
  <div id="toolbar" style="display:none;padding:6px 12px;border-bottom:1px solid #e4e7ed;display:flex;gap:2px;flex-wrap:wrap;align-items:center;font-size:13px;background:#fafafa">
    <button class="tt-btn" data-cmd="bold" style="font-weight:700">B</button>
    <button class="tt-btn" data-cmd="italic" style="font-style:italic">I</button>
    <button class="tt-btn" data-cmd="underline" style="text-decoration:underline">U</button>
    <span style="color:#dcdfe6;margin:0 4px">|</span>
    <button class="tt-btn" data-cmd="h1">H1</button>
    <button class="tt-btn" data-cmd="h2">H2</button>
    <button class="tt-btn" data-cmd="h3">H3</button>
    <span style="color:#dcdfe6;margin:0 4px">|</span>
    <button class="tt-btn" data-cmd="bulletList">≡</button>
    <button class="tt-btn" data-cmd="orderedList">#</button>
    <button class="tt-btn" data-cmd="blockquote">"</button>
  </div>
  <div id="editor" style="flex:1;padding:16px 20px;overflow-y:auto;outline:none;min-height:200px"></div>
  <div style="padding:6px 16px;border-top:1px solid #e4e7ed;text-align:right">
    <span id="status" style="font-size:11px;color:#909399;margin-right:8px"></span>
    <button id="saveBtn" class="btn" style="background:#007AFF;color:#fff;border:none;padding:6px 16px;border-radius:50px;cursor:pointer;font-size:12px">保存</button>
  </div>
</body>
</html>
